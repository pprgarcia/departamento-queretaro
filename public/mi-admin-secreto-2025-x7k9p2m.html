<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Leads V3</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">

  <div class="container mx-auto px-4 py-8 max-w-7xl">
    <h1 class="text-3xl font-bold text-indigo-800 mb-6 text-center">Panel Admin - Leads V3</h1>
    
    <!-- Sección Login -->
    <div id="loginSection" class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-lg">
      <p class="text-sm text-gray-600 mb-4 text-center">Ingresa la ADMIN_KEY del servidor</p>
      <input type="password" id="passInput" placeholder="Contraseña de Administrador" class="w-full p-3 border rounded-lg mb-4 outline-none focus:ring-2 focus:ring-indigo-500">
      <button onclick="intentarLogin()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold hover:bg-indigo-700 transition">Entrar al Panel</button>
    </div>

    <!-- Sección Panel (Oculta hasta loguearse) -->
    <div id="panelSection" class="hidden mt-8">
      <div class="bg-white rounded-xl shadow-lg p-6">
        <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
          <h2 class="text-2xl font-bold text-gray-800">Leads recibidos</h2>
          <div class="flex gap-3">
            <button onclick="exportarExcel()" class="bg-green-600 text-white px-5 py-2 rounded-lg hover:bg-green-700 transition">📊 Excel</button>
            <button onclick="borrarSeleccionados()" class="bg-red-600 text-white px-5 py-2 rounded-lg hover:bg-red-700 transition">🗑️ Borrar</button>
          </div>
        </div>

        <div class="overflow-x-auto border rounded-lg">
          <table class="min-w-full table-auto">
            <thead class="bg-indigo-600 text-white">
              <tr>
                <!-- 1 --> <th class="px-4 py-3"><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>
                <!-- 2 --> <th class="px-4 py-3">Contactado</th>
                <!-- 3 --> <th class="px-4 py-3">Nombre</th>
                <!-- 4 --> <th class="px-4 py-3">Teléfono</th>
                <!-- 5 --> <th class="px-4 py-3">Email</th>
                <!-- 6 --> <th class="px-4 py-3">Comentario</th>
                <!-- 7 --> <th class="px-4 py-3">Horario</th>
                <!-- 8 --> <th class="px-4 py-3">Fecha</th>
              </tr>
            </thead>
            <tbody class="text-gray-700 divide-y divide-gray-200">
              <!-- Se llena con JavaScript -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let ADMIN_KEY = "";

    async function intentarLogin() {
      const input = document.getElementById('passInput');
      if (!input.value) return alert("Escribe la contraseña");
      
      ADMIN_KEY = input.value;
      cargarLeads();
    }

    async function cargarLeads() {
      try {
        const res = await axios.get(`/api/leads?key=${ADMIN_KEY}`);
        
        // Si la petición es exitosa, mostramos el panel
        document.getElementById('loginSection').classList.add('hidden');
        document.getElementById('panelSection').classList.remove('hidden');

        const tbody = document.querySelector('table tbody');
        tbody.innerHTML = '';

        if (!res.data || res.data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8">No hay leads registrados</td></tr>';
          return;
        }

        res.data.forEach(row => {
          const tr = document.createElement('tr');
          tr.className = 'hover:bg-gray-50 transition';

          // Definimos las 8 celdas para que coincidan con los 8 encabezados
          const td1 = `<td class="px-4 py-3 text-center"><input type="checkbox" class="delete-check" data-id="${row.id}"></td>`;
          const td2 = `<td class="px-4 py-3 text-center"><input type="checkbox" onchange="marcarContactado(${row.id}, this.checked)" ${row.contactado ? 'checked' : ''}></td>`;
          const td3 = `<td class="px-4 py-3 font-medium text-gray-900">${row.nombre || '-'}</td>`;
          const td4 = `<td class="px-4 py-3">${row.telefono || '-'}</td>`;
          const td5 = `<td class="px-4 py-3 text-indigo-600">${row.email || '-'}</td>`;
          const td6 = `<td class="px-4 py-3 max-w-xs truncate" title="${row.comentario || ''}">${row.comentario || '-'}</td>`;
          const td7 = `<td class="px-4 py-3 text-sm">${row.horario_preferido || '-'}</td>`;
          const td8 = `<td class="px-4 py-3 text-sm text-gray-500">${row.fecha_envio ? new Date(row.fecha_envio).toLocaleString('es-MX') : '-'}</td>`;

          tr.innerHTML = td1 + td2 + td3 + td4 + td5 + td6 + td7 + td8;
          tbody.appendChild(tr);
        });

      } catch (e) {
        console.error(e);
        alert("Clave incorrecta o error de conexión al servidor.");
      }
    }

    async function marcarContactado(id, estado) {
      try {
        await axios.patch(`/api/leads/${id}?key=${ADMIN_KEY}`, { contactado: estado });
      } catch (e) {
        alert("Error al actualizar estado");
        cargarLeads();
      }
    }

    async function borrarSeleccionados() {
      const checks = document.querySelectorAll('.delete-check:checked');
      if (checks.length === 0) return alert("Selecciona leads para borrar");
      if (!confirm(`¿Borrar ${checks.length} lead(s)?`)) return;

      try {
        for (const check of checks) {
          await axios.delete(`/api/leads/${check.dataset.id}?key=${ADMIN_KEY}`);
        }
        alert("Eliminado correctamente");
        cargarLeads();
      } catch (e) {
        alert("Error al eliminar");
      }
    }

    function toggleSelectAll() {
      const master = document.getElementById('selectAll');
      document.querySelectorAll('.delete-check').forEach(cb => cb.checked = master.checked);
    }

    function exportarExcel() {
      const table = document.querySelector('table');
      const wb = XLSX.utils.table_to_book(table, { sheet: "Leads" });
      XLSX.writeFile(wb, `leads_${new Date().toISOString().slice(0,10)}.xlsx`);
    }

    document.getElementById('passInput').addEventListener('keypress', e => { if (e.key === 'Enter') intentarLogin(); });
  </script>
</body>
</html>
